services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: callsense-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: callsense
      RABBITMQ_DEFAULT_PASS: callsense123
    ports:
      - "5672:5672"    # AMQP — your .NET services connect here
      - "15672:15672"  # Management UI — http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: callsense-postgres
    environment:
      POSTGRES_USER: callsense
      POSTGRES_PASSWORD: callsense123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: callsense-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"   # Log UI — http://localhost:5341
    volumes:
      - seq_data:/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: callsense-azurite
    ports:
      - "10000:10000"  # Blob Storage
      - "10001:10001"  # Queue Storage
      - "10002:10002"  # Table Storage
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0

volumes:
  rabbitmq_data:
  postgres_data:
  seq_data:
  azurite_data:
